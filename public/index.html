
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First-Aid Kit Tracker</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>

    <div id="app">

        <!-- Kit Selection View (Lobby) -->
        <div id="kit-selection-view">
            <h1>First-Aid Kit Tracker</h1>
            <div class="form-container">
                <label for="kit-id-input">Enter or Scan Kit Box Code</label>
                <input type="text" id="kit-id-input" placeholder="e.g., WAREHOUSE-A-01">
                <button id="enter-kit-btn">Enter Kit</button>
            </div>
            <div class="link-container">
                <a href="#" id="view-all-items-btn">View All Items</a>
                <a href="/edit_items" id="edit-first-aid-items-btn">Edit First-Aid Items List</a>
            </div>
        </div>

        <!-- All Items View (Hidden by default) -->
        <div id="all-items-view" class="hidden">
            <h2>All Items Across All Kits</h2>
            <a href="#" id="back-to-kit-selection-btn">Back to Kit Selection</a>
            <div id="all-items-list"></div>
        </div>

        <!-- Kit Management View (Hidden by default) -->
        <div id="kit-management-view" class="hidden">
            <div class="header">
                <h2 id="kit-title"></h2>
                <div id="last-edited-date"></div>
                <a href="#" id="switch-kit-btn">Switch Kit</a>
            </div>

            <div id="recent-items-banner" class="hidden">
                <span id="recent-items-text"></span>
                <button id="close-recent-banner" class="close-banner-btn">&times;</button>
            </div>

            <div id="recent-items-panel" class="hidden">
                <div class="recent-panel-header">
                    <h3>Recently Edited Items</h3>
                    <button id="close-recent-panel">&times;</button>
                </div>
                <div id="recent-items-list"></div>
            </div>

            <div id="item-list">
                <!-- Items will be dynamically inserted here -->
            </div>

            <form id="add-item-form" class="form-container">
                <h3>Add New Item</h3>
                <select id="item-select"></select>
                <div id="expiry-date-container" style="display: none;">
                    <label for="expiry-date-input">Expiry Date</label>
                    <input type="date" id="expiry-date-input">
                </div>
                <div id="quantity-container">
                    <label for="quantity-input">Quantity</label>
                    <input type="number" id="quantity-input" min="1" value="1">
                </div>
                <button type="submit">Add Item</button>
            </form>
        </div>

        <!-- Edit Item Modal -->
        <div id="edit-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Edit Item</h3>
                    <button id="close-edit-modal" class="close-modal-btn">&times;</button>
                </div>
                <form id="edit-item-form">
                    <input type="hidden" id="edit-item-id">
                    <div class="form-group">
                        <label for="edit-item-name">Item Name</label>
                        <input type="text" id="edit-item-name" readonly>
                    </div>
                    <div class="form-group">
                        <label for="edit-item-qty">Quantity</label>
                        <input type="number" id="edit-item-qty" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-item-expiry">Expiry Date</label>
                        <input type="date" id="edit-item-expiry">
                    </div>
                    <div class="modal-actions">
                        <button type="button" id="cancel-edit-btn" class="btn-cancel">Cancel</button>
                        <button type="submit" class="btn-save">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Delete Confirmation Modal -->
        <div id="delete-modal" class="modal hidden">
            <div class="modal-content modal-small">
                <div class="modal-header">
                    <h3>Confirm Delete</h3>
                    <button id="close-delete-modal" class="close-modal-btn">&times;</button>
                </div>
                <p id="delete-item-name"></p>
                <div class="modal-actions">
                    <button id="cancel-delete-btn" class="btn-cancel">Cancel</button>
                    <button id="confirm-delete-btn" class="btn-delete">Delete</button>
                </div>
            </div>
        </div>

    </div>

    <script src="/app.js"></script>
</body>
</html>
